<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript DOM Project</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            transition:0.4s;
        }

        .container{
            width:90%;
            max-width:700px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            color:#1e3c72;
            margin-bottom:20px;
            transition:0.3s;
        }

        input{
            width:100%;
            padding:14px;
            border:2px solid #ccc;
            border-radius:10px;
            outline:none;
            font-size:16px;
            margin-bottom:20px;
        }

        .btn-group{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
            gap:15px;
            margin-bottom:25px;
        }

        button{
            padding:14px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:15px;
            font-weight:bold;
            color:white;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-3px);
        }

        #changeTextBtn{ background:#007bff; }
        #colorBtn{ background:#28a745; }
        #fontBtn{ background:#ff9800; }
        #toggleBtn{ background:#9c27b0; }
        #resetBtn{ background:#f44336; }

        #para{
            font-size:18px;
            color:#444;
            margin-top:15px;
            transition:0.3s;
        }

        .dark-mode{
            background:linear-gradient(135deg,#141e30,#243b55);
        }

        .message{
            margin-top:15px;
            color:#555;
            font-size:14px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1 id="heading">Welcome to JavaScript DOM</h1>

        <input 
            type="text" 
            id="inputText" 
            placeholder="Enter new heading text..."
        >

        <div class="btn-group">
            <button id="changeTextBtn">Change Heading</button>
            <button id="colorBtn">Change Background</button>
            <button id="fontBtn">Change Font Size</button>
            <button id="toggleBtn">Show/Hide Paragraph</button>
            <button id="resetBtn">Reset</button>
        </div>

        <p id="para">
            This is a sample paragraph for DOM manipulation.
        </p>

        <div class="message" id="messageBox"></div>

    </div>

    <script src="experiment6.js"></script>

</body>
</html>
